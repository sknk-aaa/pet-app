<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>まいにちペット</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Hiragino Sans', sans-serif;
      background: #FAF6F0;
      color: #2C1A0E;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .paw { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { font-size: 16px; color: #8B6347; line-height: 1.8; max-width: 480px; }
    .links { margin-top: 48px; display: flex; flex-direction: column; gap: 12px; }
    a {
      color: #F07040;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      padding: 12px 28px;
      border: 1.5px solid #F07040;
      border-radius: 999px;
      transition: background 0.15s;
    }
    a:hover { background: #FEF0E5; }
    footer { margin-top: 60px; font-size: 12px; color: #BBA898; }
  </style>
</head>
<body>
  <div class="paw">🐾</div>
  <h1>まいにちペット</h1>
  <p>毎日の1枚を、かけがえない思い出に。<br>ペットとの毎日を日記として残すアプリです。</p>
  <div class="links">
    <a href="./privacy/">プライバシーポリシー</a>
  </div>
  <footer>© まいにちペット</footer>
</body>
</html>
