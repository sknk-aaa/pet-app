<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メールアドレスの確認 | まいにちペット</title>
<style>
  body { margin: 0; padding: 0; background: #FAF6F0; font-family: -apple-system, sans-serif; }
  .wrap { max-width: 480px; margin: 40px auto; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 24px rgba(50,25,5,0.08); }
  .header { background: linear-gradient(135deg, #F59060, #F07040); padding: 36px 32px; text-align: center; }
  .paw { font-size: 48px; }
  .app-name { color: #fff; font-size: 22px; font-weight: 700; margin-top: 8px; }
  .body { padding: 36px 32px; }
  .greeting { font-size: 18px; font-weight: 700; color: #2C1A0E; margin-bottom: 16px; }
  .text { font-size: 15px; color: #5a3d25; line-height: 1.8; margin-bottom: 24px; }
  .btn-wrap { text-align: center; margin: 28px 0; }
  .btn { display: inline-block; background: linear-gradient(90deg, #F59060, #F07040); color: #fff; text-decoration: none; font-size: 16px; font-weight: 700; padding: 16px 40px; border-radius: 999px; }
  .note { font-size: 12px; color: #BBA898; text-align: center; line-height: 1.8; }
  .footer { background: #FAF6F0; padding: 20px 32px; text-align: center; font-size: 11px; color: #BBA898; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="paw">🐾</div>
    <div class="app-name">まいにちペット</div>
  </div>
  <div class="body">
    <div class="greeting">メールアドレスの確認</div>
    <div class="text">
      まいにちペットへのご登録ありがとうございます！<br>
      以下のボタンをタップしてメールアドレスを確認してください。<br>
      確認が完了するとアプリをご利用いただけます。
    </div>
    <div class="btn-wrap">
      <a class="btn" href="{{ .ConfirmationURL }}">メールアドレスを確認する</a>
    </div>
    <div class="note">
      このリンクは24時間有効です。<br>
      心当たりのない場合は、このメールを無視してください。
    </div>
  </div>
  <div class="footer">
    © まいにちペット — 毎日の1枚を大切に
  </div>
</div>
</body>
</html>
